version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - npm install -g pnpm@9.9.0
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm exec turbo run build --filter=frontend
  artifacts:
    baseDirectory: Frontend/dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .turbo/**/*
      - Frontend/node_modules/**/*
